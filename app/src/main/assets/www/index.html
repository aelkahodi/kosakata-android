<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Kosakata Indonesia</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <meta name="theme-color" content="#6c63ff"/>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3352;
      --accent: #6c63ff; --accent2: #8b83ff;
      --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
      --text: #e8eaf6; --muted: #8892b0; --radius: 14px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column;
      padding-top: var(--safe-top);
    }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; gap: 6px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo { font-size: 1.1rem; font-weight: 700; color: var(--accent2); margin-right: auto; }
    nav button {
      padding: 7px 16px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
    }
    nav button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── SCROLL AREA ── */
    .page {
      display: none; overflow-y: auto; flex: 1;
      padding: 20px 16px;
      padding-bottom: calc(16px + var(--safe-bottom));
    }
    .page.active { display: block; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 10px; border: none;
      cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:active { background: var(--accent2); transform: scale(0.97); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:active { transform: scale(0.97); }

    /* ── SETUP ── */
    #setup-panel { padding: 8px 0 24px; }
    #setup-panel h1 { font-size: 1.7rem; margin-bottom: 6px; text-align: center; }
    #setup-panel > p { color: var(--muted); margin-bottom: 20px; text-align: center; font-size: 0.9rem; }
    .vocab-count {
      display: block; text-align: center;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 16px; margin-bottom: 20px;
      font-size: 0.88rem; color: var(--muted);
    }
    .vocab-count span { color: var(--accent2); font-weight: 700; }

    .theme-section-label {
      font-size: 0.75rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 10px;
    }
    .theme-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 20px;
    }
    .theme-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 11px; border-radius: 9px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; font-size: 0.78rem;
      text-align: left; transition: all 0.15s; line-height: 1.3;
    }
    .theme-btn:active { transform: scale(0.97); }
    .theme-btn.selected { border-color: var(--accent); background: rgba(108,99,255,0.15); color: var(--text); }
    .theme-btn .t-emoji { font-size: 0.95rem; flex-shrink: 0; }
    .theme-btn .t-name { flex: 1; }
    .theme-btn .t-count { font-size: 0.7rem; color: var(--muted); flex-shrink: 0; }
    .theme-btn.selected .t-count { color: var(--accent2); }

    .setup-footer { text-align: center; }
    .word-preview { font-size: 0.82rem; color: var(--muted); margin-bottom: 14px; min-height: 18px; }
    .word-preview span { color: var(--accent2); font-weight: 600; }
    .word-preview .warn { color: var(--yellow) !important; font-weight: 600; }

    /* ── QUIZ ── */
    #quiz-active { display: none; }
    .q-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; }
    .score-live { color: var(--accent2); font-weight: 600; }
    .progress-wrap { height: 5px; background: var(--surface2); border-radius: 99px; margin-bottom: 20px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.4s ease; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px 20px; margin-bottom: 14px;
    }
    .theme-badge {
      display: inline-block; background: rgba(108,99,255,0.15); color: var(--accent2);
      border-radius: 6px; padding: 3px 10px; font-size: 0.75rem; margin-bottom: 12px;
    }
    .english-word { font-size: 1.7rem; font-weight: 700; margin-bottom: 6px; }
    .hint { color: var(--muted); font-size: 0.85rem; }

    .answer-input {
      width: 100%; padding: 14px 16px; border-radius: 10px;
      border: 2px solid var(--border); background: var(--surface2);
      color: var(--text); font-size: 1.05rem; outline: none;
      transition: border-color 0.2s; margin-bottom: 12px;
      -webkit-appearance: none;
    }
    .answer-input:focus { border-color: var(--accent); }
    .answer-input.correct { border-color: var(--green); background: rgba(34,197,94,0.08); }
    .answer-input.wrong { border-color: var(--red); background: rgba(239,68,68,0.08); }

    .feedback {
      display: none; padding: 12px 16px; border-radius: 9px;
      margin-bottom: 12px; font-size: 0.9rem; align-items: center; gap: 8px;
    }
    .feedback.correct { display: flex; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
    .feedback.wrong { display: flex; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
    .feedback .correct-ans { color: var(--text); font-weight: 700; }

    .quiz-actions { display: flex; gap: 10px; }
    .quiz-actions .btn { flex: 1; justify-content: center; }

    /* ── RESULTS ── */
    #results-panel { display: none; padding-bottom: 32px; }
    .score-circle {
      width: 130px; height: 130px; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin: 8px auto 24px; font-size: 2.2rem; font-weight: 800;
    }
    .score-circle .lbl { font-size: 0.75rem; font-weight: 400; color: var(--muted); }
    .score-circle.great { background: rgba(34,197,94,0.15); border: 3px solid var(--green); color: var(--green); }
    .score-circle.ok { background: rgba(245,158,11,0.15); border: 3px solid var(--yellow); color: var(--yellow); }
    .score-circle.poor { background: rgba(239,68,68,0.15); border: 3px solid var(--red); color: var(--red); }
    #results-panel h2 { text-align: center; font-size: 1.3rem; margin-bottom: 6px; }
    #results-panel .sub { text-align: center; color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; }
    .wrong-list h3 { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .wrong-item {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 10px 14px; border-radius: 9px;
      background: var(--surface); border: 1px solid var(--border);
      margin-bottom: 7px; font-size: 0.85rem;
    }
    .wrong-item .eng { color: var(--muted); }
    .wrong-item .idn { color: var(--accent2); font-weight: 600; }
    .wrong-item .user-ans { color: var(--red); font-size: 0.75rem; margin-top: 2px; }
    .results-actions { display: flex; gap: 10px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }

    /* ── DASHBOARD ── */
    #dashboard h1 { font-size: 1.5rem; margin-bottom: 6px; }
    #dashboard .sub { color: var(--muted); margin-bottom: 20px; font-size: 0.88rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 10px; text-align: center;
    }
    .stat-card .val { font-size: 1.6rem; font-weight: 700; color: var(--accent2); }
    .stat-card .lbl { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

    .chart-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 14px; margin-bottom: 20px;
    }
    .chart-wrap h3 { font-size: 0.75rem; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 64px; }
    .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 3px; }
    .bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 3px; }
    .bar-lbl { font-size: 0.6rem; color: var(--muted); }

    .history-wrap { overflow-x: auto; }
    .history-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .history-table th {
      text-align: left; padding: 8px 10px; color: var(--muted);
      border-bottom: 1px solid var(--border); font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500;
    }
    .history-table td { padding: 10px 10px; border-bottom: 1px solid rgba(46,51,82,0.4); }
    .history-table tr:last-child td { border-bottom: none; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.72rem; font-weight: 600; }
    .pill.great { background: rgba(34,197,94,0.15); color: var(--green); }
    .pill.ok    { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .pill.poor  { background: rgba(239,68,68,0.15); color: var(--red); }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
  </style>
</head>
<body>

<nav>
  <span class="logo">🇮🇩 Kosakata</span>
  <button id="tab-quiz" class="active" onclick="showTab('quiz')">Quiz</button>
  <button id="tab-dash" onclick="showTab('dashboard')">Dashboard</button>
</nav>

<!-- ══ QUIZ PAGE ══ -->
<div id="quiz" class="page active">

  <!-- Setup -->
  <div id="setup-panel">
    <h1>Kosakata 🇮🇩</h1>
    <p>Quiz de vocabulaire anglais → indonésien</p>
    <div class="vocab-count"><span>1849</span> mots dans la base</div>

    <div class="theme-section-label">Choisir une thématique</div>
    <div class="theme-grid" id="theme-grid"></div>

    <div class="setup-footer">
      <div class="word-preview" id="word-preview"></div>
      <button class="btn btn-primary" onclick="startQuiz()">▶ Démarrer</button>
    </div>
  </div>

  <!-- Quiz actif -->
  <div id="quiz-active">
    <div class="q-meta">
      <span id="q-counter">1 / 20</span>
      <span class="score-live" id="score-live">✓ 0 ✗ 0</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="card">
      <span class="theme-badge" id="q-theme"></span>
      <div class="english-word" id="q-english"></div>
      <div class="hint" id="q-hint"></div>
    </div>
    <input type="text" id="answer-input" class="answer-input"
           placeholder="Traduction indonésienne…"
           onkeydown="if(event.key==='Enter')handleAnswer()"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    <div class="feedback" id="feedback"></div>
    <div class="quiz-actions">
      <button class="btn btn-primary" id="submit-btn" onclick="handleAnswer()">Valider</button>
      <button class="btn btn-secondary" id="next-btn" onclick="nextQuestion()" style="display:none">Suivant →</button>
    </div>
  </div>

  <!-- Résultats -->
  <div id="results-panel">
    <div id="score-circle" class="score-circle"></div>
    <h2 id="result-title"></h2>
    <p class="sub" id="result-sub"></p>
    <div class="wrong-list" id="wrong-list"></div>
    <div class="results-actions">
      <button class="btn btn-primary" onclick="startQuiz()">↺ Rejouer</button>
      <button class="btn btn-secondary" onclick="backToSetup()">← Thèmes</button>
      <button class="btn btn-secondary" onclick="showTab('dashboard')">📊 Stats</button>
    </div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard" class="page">
  <h1>Tableau de bord</h1>
  <p class="sub">Historique de vos sessions</p>
  <div id="dash-empty" class="empty-state" style="display:none">
    <div class="icon">📈</div>
    <p>Aucune session enregistrée.<br>Faites votre premier quiz !</p>
  </div>
  <div id="dash-content" style="display:none">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="chart-wrap">
      <h3>Progression (10 dernières)</h3>
      <div class="bar-chart" id="bar-chart"></div>
    </div>
    <div class="history-wrap">
      <table class="history-table">
        <thead><tr><th>Date</th><th>Thème</th><th>Score</th><th>%</th><th>Niveau</th></tr></thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>
</div>

  grid.innerHTML = `<button class="theme-btn selected" onclick="selectTheme(null,this)" style="grid-column:span 2">
    <span class="t-emoji">🗂️</span><span class="t-name">Tous les thèmes</span>
    <span class="t-count">${VOCABULARY.length}</span>
  </button>` + themes.map(([t,c]) =>
    `<button class="theme-btn" onclick="selectTheme(${JSON.stringify(t)},this)">
      <span class="t-emoji">${THEME_EMOJIS[t]||'📌'}</span>
      <span class="t-name">${t}</span>
      <span class="t-count">${c}</span>
    </button>`
  ).join('');
  updatePreview();
  
})();

function selectTheme(t, btn) {
  selectedTheme = t;
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  updatePreview();
}

function updatePreview() {
  const pool = selectedTheme ? VOCABULARY.filter(w=>w.theme===selectedTheme) : VOCABULARY;
  const n = pool.length, q = Math.min(n, 20);
  const el = document.getElementById('word-preview');
  el.innerHTML = n < 20
    ? `<span class="warn">${n} mots disponibles</span> — quiz sur les ${q} mots du thème`
    : `<span>${n}</span> mots · 20 tirés au sort`;
}

// ══ QUIZ ══
function startQuiz() {
  const pool = selectedTheme ? VOCABULARY.filter(w=>w.theme===selectedTheme) : VOCABULARY;
  quizWords = [...pool].sort(()=>Math.random()-0.5).slice(0,20);
  currentIndex = 0; correctCount = 0; wrongAnswers = [];

  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('results-panel').style.display = 'none';
  document.getElementById('quiz-active').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const w = quizWords[currentIndex];
  const parts = w.eng.split(',').map(s=>s.trim());
  document.getElementById('q-counter').textContent = `${currentIndex+1} / ${quizWords.length}`;
  document.getElementById('score-live').textContent = `✓ ${correctCount} ✗ ${currentIndex-correctCount}`;
  document.getElementById('progress-bar').style.width = `${(currentIndex/quizWords.length)*100}%`;
  document.getElementById('q-theme').textContent = w.theme || w.classe;
  document.getElementById('q-english').textContent = parts[0];
  document.getElementById('q-hint').textContent = parts.length > 1 ? `Aussi : ${parts.slice(1).join(', ')}` : w.classe;

  const inp = document.getElementById('answer-input');
  inp.value=''; inp.className='answer-input'; inp.disabled=false;
  setTimeout(()=>inp.focus(), 80);

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('submit-btn').style.display = 'flex';
  document.getElementById('next-btn').style.display = 'none';
}

function normalize(s) { return s.trim().toLowerCase().replace(/\s+/g,' '); }

function handleAnswer() {
  if (answered) return;
  const w = quizWords[currentIndex];
  const ans = document.getElementById('answer-input').value;
  if (!ans.trim()) return;
  answered = true;
  const ok = normalize(ans) === normalize(w.idn);
  const inp = document.getElementById('answer-input');
  inp.disabled = true;
  inp.className = 'answer-input ' + (ok ? 'correct' : 'wrong');
  const fb = document.getElementById('feedback');
  if (ok) {
    correctCount++;
    fb.className='feedback correct';
    fb.innerHTML='<span>✓</span> Excellent !';
  } else {
    wrongAnswers.push({eng:w.eng, idn:w.idn, userAns:ans});
    fb.className='feedback wrong';
    fb.innerHTML=`<span>✗</span> La bonne réponse est : <span class="correct-ans">${w.idn}</span>`;
  }
  document.getElementById('submit-btn').style.display = 'none';
  const isLast = currentIndex === quizWords.length-1;
  const nb = document.getElementById('next-btn');
  nb.textContent = isLast ? 'Résultats →' : 'Suivant →';
  nb.style.display = 'flex';
  document.getElementById('score-live').textContent = `✓ ${correctCount} ✗ ${currentIndex+1-correctCount}`;
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= quizWords.length) showResults();
  else showQuestion();
}

// ══ RESULTS ══
function showResults() {
  document.getElementById('quiz-active').style.display = 'none';
  document.getElementById('results-panel').style.display = 'block';
  const total = quizWords.length;
  const pct = Math.round((correctCount/total)*100);
  const lvl = pct>=80?'great':pct>=50?'ok':'poor';
  const titles = {great:'🎉 Excellent !', ok:'👍 Pas mal !', poor:'💪 Continue !'};
  const tl = selectedTheme ? `· ${THEME_EMOJIS[selectedTheme]||''} ${selectedTheme}` : '';
  const subs = {
    great:`${correctCount}/${total} ${tl} — vous maîtrisez ce vocabulaire !`,
    ok:`${correctCount}/${total} ${tl} — encore un peu d'entraînement !`,
    poor:`${correctCount}/${total} ${tl} — révisez les mots ci-dessous.`
  };
  const circle = document.getElementById('score-circle');
  circle.className=`score-circle ${lvl}`;
  circle.innerHTML=`${pct}%<span class="lbl">${correctCount}/${total}</span>`;
  document.getElementById('result-title').textContent=titles[lvl];
  document.getElementById('result-sub').textContent=subs[lvl];
  const wl = document.getElementById('wrong-list');
  wl.innerHTML = wrongAnswers.length ? `<h3>À revoir (${wrongAnswers.length})</h3>`+
    wrongAnswers.map(w=>`<div class="wrong-item">
      <span class="eng">${w.eng.split(',')[0]}</span>
      <div><div class="idn">${w.idn}</div><div class="user-ans">${w.userAns||'(vide)'}</div></div>
    </div>`).join('') : '';
  saveSession(correctCount, pct, selectedTheme, total);
}

function backToSetup() {
  document.getElementById('results-panel').style.display='none';
  document.getElementById('setup-panel').style.display='block';
}

// ══ STORAGE ══
function saveSession(score, pct, theme, total) {
  const h = getHistory();
  h.unshift({date:new Date().toISOString(), score, total, pct, theme:theme||null});
  localStorage.setItem(STORAGE_KEY, JSON.stringify(h.slice(0,100)));
}
function getHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; } catch { return []; }
}

// ══ DASHBOARD ══
function renderDashboard() {
  const h = getHistory();
  if (!h.length) {
    document.getElementById('dash-empty').style.display='block';
    document.getElementById('dash-content').style.display='none';
    return;
  }
  document.getElementById('dash-empty').style.display='none';
  document.getElementById('dash-content').style.display='block';
  const avg=Math.round(h.reduce((s,x)=>s+x.pct,0)/h.length);
  const best=Math.max(...h.map(x=>x.pct));
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="val">${h.length}</div><div class="lbl">Sessions</div></div>
    <div class="stat-card"><div class="val">${avg}%</div><div class="lbl">Moyenne</div></div>
    <div class="stat-card"><div class="val">${best}%</div><div class="lbl">Record</div></div>`;
  const recent=[...h].slice(0,10).reverse();
  document.getElementById('bar-chart').innerHTML=recent.map(x=>{
    const col=x.pct>=80?'#22c55e':x.pct>=50?'#f59e0b':'#ef4444';
    const ht=Math.max(3,Math.round((x.pct/100)*56));
    return `<div class="bar-col"><div class="bar" style="height:${ht}px;background:${col}"></div><div class="bar-lbl">${x.pct}%</div></div>`;
  }).join('');
  document.getElementById('history-body').innerHTML=h.map(x=>{
    const lvl=x.pct>=80?'great':x.pct>=50?'ok':'poor';
    const lab={great:'Excellent',ok:'Bien',poor:'À revoir'}[lvl];
    const d=new Date(x.date);
    const ds=d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
    const ts=d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const em=x.theme?(THEME_EMOJIS[x.theme]||'📌'):'🗂️';
    const tl=x.theme?x.theme:'Tous';
    return `<tr>
      <td>${ds} <span style="color:var(--muted);font-size:0.7rem">${ts}</span></td>
      <td style="font-size:0.78rem">${em} ${tl}</td>
      <td>${x.score}/${x.total}</td>
      <td>${x.pct}%</td>
      <td><span class="pill ${lvl}">${lab}</span></td>
    </tr>`;
  }).join('');
}

// ══ TABS ══
function showTab(tab) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.getElementById('tab-'+(tab==='dashboard'?'dash':'quiz')).classList.add('active');
  if (tab==='dashboard') renderDashboard();
}
</script>
</body>
