<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Kosakata Indonesia</title>
  <style>

    :root {
      --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3352;
      --accent:#6c63ff;--accent2:#8b83ff;
      --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#38bdf8;
      --text:#e8eaf6;--muted:#8892b0;--radius:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:10px;border:none;cursor:pointer;font-size:0.95rem;font-weight:600;transition:all 0.18s;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{background:var(--accent2);}
    .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
    .btn-secondary:hover{border-color:var(--accent2);}
    .btn:active{transform:scale(0.97);}

    /* SETUP */
    .setup-header{text-align:center;margin-bottom:24px;}
    .setup-header h1{font-size:1.9rem;margin-bottom:8px;}
    .setup-header p{color:var(--muted);margin-bottom:14px;}
    .vocab-count{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 18px;font-size:0.88rem;color:var(--muted);}
    .vocab-count span{color:var(--accent2);font-weight:700;}
    .section-lbl{font-size:0.76rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
    .theme-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:0.82rem;text-align:left;transition:all 0.15s;line-height:1.3;}
    .theme-btn:hover{border-color:var(--accent2);color:var(--text);}
    .theme-btn.selected{border-color:var(--accent);background:rgba(108,99,255,0.15);color:var(--text);}
    .theme-btn .t-emoji{font-size:0.95rem;flex-shrink:0;}
    .theme-btn .t-name{flex:1;}
    .theme-btn .t-count{font-size:0.7rem;color:var(--muted);flex-shrink:0;}
    .theme-btn.selected .t-count{color:var(--accent2);}
    .setup-footer{text-align:center;margin-top:4px;}
    .word-preview{font-size:0.83rem;color:var(--muted);margin-bottom:14px;min-height:18px;}
    .word-preview span{color:var(--accent2);font-weight:600;}
    .word-preview .warn{color:var(--yellow)!important;font-weight:600;}

    /* QUIZ */
    #quiz-active{display:none;}
    .q-meta{display:flex;justify-content:space-between;font-size:0.82rem;color:var(--muted);margin-bottom:10px;}
    .score-live{color:var(--accent2);font-weight:600;}
    .progress-wrap{height:5px;background:var(--surface2);border-radius:99px;margin-bottom:22px;overflow:hidden;}
    .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 0.4s ease;}

    /* CARTE */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:14px;}
    .card-badges{margin-bottom:12px;display:flex;gap:6px;flex-wrap:wrap;}
    .theme-badge{display:inline-block;background:rgba(108,99,255,0.15);color:var(--accent2);border-radius:6px;padding:3px 10px;font-size:0.72rem;}
    .class-badge{display:inline-block;background:rgba(56,189,248,0.12);color:var(--blue);border-radius:6px;padding:3px 10px;font-size:0.72rem;}
    .q-english{font-size:1.8rem;font-weight:700;margin-bottom:5px;}
    .q-french{color:var(--muted);font-size:0.9rem;}

    /* INPUT */
    .answer-input{width:100%;padding:13px 16px;border-radius:10px;border:2px solid var(--border);background:var(--surface2);color:var(--text);font-size:1.05rem;outline:none;transition:border-color 0.2s;margin-bottom:12px;-webkit-appearance:none;}
    .answer-input:focus{border-color:var(--accent);}
    .answer-input.correct{border-color:var(--green);background:rgba(34,197,94,0.07);}
    .answer-input.partial{border-color:var(--yellow);background:rgba(245,158,11,0.07);}
    .answer-input.wrong{border-color:var(--red);background:rgba(239,68,68,0.07);}

    /* FEEDBACK PRINCIPAL */
    .feedback-main{display:none;padding:14px 16px;border-radius:10px;margin-bottom:12px;font-size:0.9rem;gap:12px;align-items:flex-start;}
    .feedback-main.correct{display:flex;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);}
    .feedback-main.partial{display:flex;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);}
    .feedback-main.wrong  {display:flex;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);}
    .fb-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px;}
    .fb-body{flex:1;}
    .fb-title{font-weight:700;margin-bottom:4px;}
    .feedback-main.correct .fb-title{color:var(--green);}
    .feedback-main.partial .fb-title{color:var(--yellow);}
    .feedback-main.wrong   .fb-title{color:var(--red);}
    .fb-half{font-size:0.78rem;font-weight:400;opacity:0.85;}
    .fb-note{font-size:0.83rem;color:var(--text);margin-top:2px;}
    .fb-alt{white-space:nowrap;}
    .fb-reg{display:inline-block;font-size:0.7rem;color:var(--blue);background:rgba(56,189,248,0.12);border-radius:4px;padding:1px 6px;margin-right:3px;vertical-align:middle;}
    /* Bloc réponses multiples en cas d'erreur */
    .fb-answers-block{margin-top:6px;}
    .fb-label{font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px;}
    .fb-answer-item{font-size:0.88rem;color:var(--text);padding:4px 0;border-bottom:1px solid rgba(46,51,82,0.4);}
    .fb-answer-item:last-child{border-bottom:none;}
    .fb-note-inline{color:var(--muted);font-size:0.82rem;}

    /* SYNONYMES */
    .synonymes-bloc{display:none;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
    .synonymes-bloc.show{display:block;}
    .syn-title{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;}
    .syn-list{display:flex;flex-direction:column;gap:7px;}
    .syn-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:9px;background:var(--surface);border:1px solid var(--border);}
    .syn-item.is-user{border-color:var(--green);background:rgba(34,197,94,0.07);}
    .syn-item.is-partial{border-color:var(--yellow);background:rgba(245,158,11,0.07);}
    .syn-item.is-correct-ans{border-color:var(--accent);background:rgba(108,99,255,0.07);}
    .syn-mot{font-weight:700;font-size:0.9rem;min-width:90px;}
    .syn-item.is-user .syn-mot{color:var(--green);}
    .syn-item.is-partial .syn-mot{color:var(--yellow);}
    .syn-item.is-correct-ans .syn-mot{color:var(--accent2);}
    .syn-meta{flex:1;}
    .syn-registre{font-size:0.7rem;color:var(--blue);background:rgba(56,189,248,0.1);border-radius:4px;padding:2px 6px;display:inline-block;margin-bottom:3px;}
    .syn-note{font-size:0.78rem;color:var(--muted);font-style:italic;}
    .syn-badge-user{font-size:0.68rem;color:var(--green);font-weight:700;margin-left:5px;}
    .syn-badge-partial{font-size:0.68rem;color:var(--yellow);font-weight:700;margin-left:5px;}

    /* ACTIONS */
    .quiz-actions{display:flex;gap:10px;}
    .quiz-actions .btn{flex:1;justify-content:center;}

    /* RÉSULTATS */
    #results-panel{display:none;}
    .score-circle{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:8px auto 24px;font-size:2.3rem;font-weight:800;}
    .score-circle .lbl{font-size:0.76rem;font-weight:400;color:var(--muted);}
    .score-circle.great{background:rgba(34,197,94,0.15);border:3px solid var(--green);color:var(--green);}
    .score-circle.ok   {background:rgba(245,158,11,0.15);border:3px solid var(--yellow);color:var(--yellow);}
    .score-circle.poor {background:rgba(239,68,68,0.15);border:3px solid var(--red);color:var(--red);}
    #results-panel h2{text-align:center;font-size:1.4rem;margin-bottom:6px;}
    #results-panel .sub{text-align:center;color:var(--muted);font-size:0.87rem;margin-bottom:24px;}
    .wrong-list h3{font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;}
    .wrong-item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;border-radius:9px;background:var(--surface);border:1px solid var(--border);margin-bottom:7px;}
    .wrong-item .eng{color:var(--muted);font-size:0.88rem;}
    .wrong-item .fra{font-size:0.78rem;color:var(--muted);}
    .wrong-item .idn{color:var(--accent2);font-weight:600;font-size:0.88rem;}
    .wrong-item .user-ans{color:var(--red);font-size:0.76rem;margin-top:2px;}
    .results-actions{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap;}

    /* DASHBOARD */
    #dashboard h1{font-size:1.5rem;margin-bottom:6px;}
    #dashboard .sub{color:var(--muted);margin-bottom:22px;}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 10px;text-align:center;}
    .stat-card .val{font-size:1.7rem;font-weight:700;color:var(--accent2);}
    .stat-card .lbl{font-size:0.72rem;color:var(--muted);margin-top:3px;}
    .chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:20px;}
    .chart-wrap h3{font-size:0.74rem;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.04em;}
    .bar-chart{display:flex;align-items:flex-end;gap:5px;}
    .bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px;}
    .bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;}
    .bar-lbl{font-size:0.6rem;color:var(--muted);}
    .history-wrap{overflow-x:auto;}
    .history-table{width:100%;border-collapse:collapse;font-size:0.85rem;}
    .history-table th{text-align:left;padding:9px 12px;color:var(--muted);border-bottom:1px solid var(--border);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;font-weight:500;}
    .history-table td{padding:11px 12px;border-bottom:1px solid rgba(46,51,82,0.4);}
    .history-table tr:last-child td{border-bottom:none;}
    .pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:0.72rem;font-weight:600;}
    .pill.great{background:rgba(34,197,94,0.15);color:var(--green);}
    .pill.ok   {background:rgba(245,158,11,0.15);color:var(--yellow);}
    .pill.poor {background:rgba(239,68,68,0.15);color:var(--red);}
    .empty-state{text-align:center;padding:52px 24px;color:var(--muted);}
    .empty-state .icon{font-size:2.8rem;margin-bottom:14px;}

    html,body{height:100%;overflow:hidden;}
    body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
    nav{display:flex;align-items:center;gap:6px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
    .logo{font-size:1.05rem;font-weight:700;color:var(--accent2);margin-right:auto;}
    nav button{padding:7px 15px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:0.83rem;transition:all 0.2s;}
    nav button.active{background:var(--accent);border-color:var(--accent);color:#fff;}
    .page{display:none;overflow-y:auto;flex:1;padding:18px 16px 32px;}
    .page.active{display:block;}
    .theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:20px;}
    .q-english{font-size:1.65rem;}
    .bar-chart{height:64px;}
  </style>
</head>
<body>
<nav>
  <span class="logo">🇮🇩 Kosakata</span>
  <button id="tab-quiz" class="active" onclick="showTab('quiz')">Quiz</button>
  <button id="tab-dash" onclick="showTab('dashboard')">Dashboard</button>
</nav>

<div id="quiz" class="page active">

  <!-- Setup -->
  <div id="setup-panel">
    <div class="setup-header">
      <h1>Kosakata 🇮🇩</h1>
      <p>Traduisez de l'anglais vers l'indonésien</p>
      <div class="vocab-count" id="vocab-info"></div>
    </div>
    <div class="section-lbl">Choisir une thématique</div>
    <div class="theme-grid" id="theme-grid"></div>
    <div class="setup-footer">
      <div class="word-preview" id="word-preview"></div>
      <button class="btn btn-primary" onclick="startQuiz()">▶ Démarrer le quiz</button>
    </div>
  </div>

  <!-- Quiz actif -->
  <div id="quiz-active">
    <div class="q-meta">
      <span id="q-counter">Question 1 / 20</span>
      <span class="score-live" id="score-live">✓ 0 &nbsp; ✗ 0</span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    <div class="card">
      <div class="card-badges">
        <span class="theme-badge" id="q-theme"></span>
        <span class="class-badge" id="q-class"></span>
      </div>
      <div class="q-english" id="q-english"></div>
      <div class="q-french" id="q-french"></div>
    </div>
    <input type="text" id="answer-input" class="answer-input"
           placeholder="Réponse en indonésien…"
           onkeydown="if(event.key==='Enter')handleAnswer()"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    <div class="feedback-main" id="feedback-main"></div>
    <div class="synonymes-bloc" id="synonymes-bloc">
      <div class="syn-title">Détail des variantes</div>
      <div class="syn-list" id="syn-list"></div>
    </div>
    <div class="quiz-actions">
      <button class="btn btn-primary" id="submit-btn" onclick="handleAnswer()">Valider</button>
      <button class="btn btn-secondary" id="next-btn" onclick="nextQuestion()" style="display:none">Suivant →</button>
    </div>
  </div>

  <!-- Résultats -->
  <div id="results-panel">
    <div id="score-circle" class="score-circle"></div>
    <h2 id="result-title"></h2>
    <p class="sub" id="result-sub"></p>
    <div class="wrong-list" id="wrong-list"></div>
    <div class="results-actions">
      <button class="btn btn-primary" onclick="startQuiz()">↺ Rejouer</button>
      <button class="btn btn-secondary" onclick="backToSetup()">← Thèmes</button>
      <button class="btn btn-secondary" onclick="showTab('dashboard')">📊 Stats</button>
    </div>
  </div>

</div>

<div id="dashboard" class="page">
  <h1>Tableau de bord</h1>
  <p class="sub">Historique de vos sessions</p>
  <div id="dash-empty" class="empty-state" style="display:none"><div class="icon">📈</div><p>Aucune session.<br>Faites votre premier quiz !</p></div>
  <div id="dash-content" style="display:none">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="chart-wrap"><h3>Progression (10 dernières)</h3><div class="bar-chart" id="bar-chart"></div></div>
    <div class="history-wrap"><table class="history-table"><thead><tr><th>Date</th><th>Thème</th><th>Score</th><th>%</th><th>Niveau</th></tr></thead><tbody id="history-body"></tbody></table></div>
  </div>
</div>

<script>

// ══ LEVENSHTEIN ══
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) => Array.from({length:n+1}, (_,j) => i ? (j ? 0 : i) : j));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function similarity(a, b) {
  a = normalize(a); b = normalize(b);
  if (a===b) return 1;
  if (!a.length||!b.length) return 0;
  return 1 - levenshtein(a,b) / Math.max(a.length,b.length);
}

// ══ INIT ══
function initApp() {
  const counts={};
  VOCABULARY.forEach(w=>{counts[w.theme]=(counts[w.theme]||0)+1;});
  const themes=Object.entries(counts).sort((a,b)=>a[0].localeCompare(b[0]));
  _themeList=themes.map(([t])=>t);
  document.getElementById('vocab-info').innerHTML=
    `<span>${VOCABULARY.length}</span> mots · <span>${VOCABULARY.filter(v=>v.synonymes&&v.synonymes.length).length}</span> avec synonymes`;
  const grid=document.getElementById('theme-grid');
  grid.innerHTML=
    `<button class="theme-btn selected" onclick="selectTheme(-1)" style="grid-column:span 2">
      <span class="t-emoji">🗂️</span><span class="t-name">Tous les thèmes</span>
      <span class="t-count">${VOCABULARY.length}</span>
    </button>`+
    themes.map(([t,c],i)=>
      `<button class="theme-btn" onclick="selectTheme(${i})">
        <span class="t-emoji">${THEME_EMOJIS[t]||'📌'}</span>
        <span class="t-name">${t}</span>
        <span class="t-count">${c}</span>
      </button>`).join('');
  grid.addEventListener('click',e=>{
    const btn=e.target.closest('.theme-btn');
    if(!btn)return;
    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
  });
  updatePreview();
}

function selectTheme(idx) {
  selectedTheme=idx===-1?null:_themeList[idx];
  updatePreview();
}
function updatePreview() {
  const pool=selectedTheme?VOCABULARY.filter(w=>w.theme===selectedTheme):VOCABULARY;
  const n=pool.length,q=Math.min(n,20);
  const el=document.getElementById('word-preview');
  el.innerHTML=n<20
    ?`<span class="warn">${n} mots disponibles</span> — quiz sur les ${q} mots du thème`
    :`<span>${n}</span> mots disponibles · 20 tirés au sort`;
}

// ══ QUIZ ══
function startQuiz() {
  const pool=selectedTheme?VOCABULARY.filter(w=>w.theme===selectedTheme):VOCABULARY;
  quizWords=[...pool].sort(()=>Math.random()-0.5).slice(0,20);
  currentIndex=0;correctCount=0;partialCount=0;wrongAnswers=[];
  document.getElementById('setup-panel').style.display='none';
  document.getElementById('results-panel').style.display='none';
  document.getElementById('quiz-active').style.display='block';
  showQuestion();
}

function showQuestion() {
  answered=false;
  const w=quizWords[currentIndex];
  document.getElementById('q-counter').textContent=`Question ${currentIndex+1} / ${quizWords.length}`;
  updateScoreLive();
  document.getElementById('progress-bar').style.width=`${(currentIndex/quizWords.length)*100}%`;
  document.getElementById('q-theme').textContent=w.theme;
  document.getElementById('q-class').textContent=w.classe_grammaticale;
  document.getElementById('q-english').textContent=w.anglais;
  document.getElementById('q-french').textContent=w.francais;
  const inp=document.getElementById('answer-input');
  inp.value='';inp.className='answer-input';inp.disabled=false;
  setTimeout(()=>inp.focus(),80);
  document.getElementById('feedback-main').className='feedback-main';
  document.getElementById('feedback-main').innerHTML='';
  document.getElementById('synonymes-bloc').classList.remove('show');
  document.getElementById('syn-list').innerHTML='';
  document.getElementById('submit-btn').style.display='inline-flex';
  document.getElementById('next-btn').style.display='none';
}

function updateScoreLive() {
  const score=correctCount+partialCount*0.5;
  const wrong=currentIndex-correctCount-partialCount;
  document.getElementById('score-live').innerHTML=
    `✓ ${score%1===0?score:score.toFixed(1)} &nbsp; ✗ ${wrong}`;
}

function normalize(s){return s.trim().toLowerCase().replace(/\s+/g,' ');}

function handleAnswer() {
  if(answered)return;
  const w=quizWords[currentIndex];
  const userAns=document.getElementById('answer-input').value;
  if(!userAns.trim())return;
  answered=true;

  const accepted=w.reponses_acceptees||[w.indonesien];
  const exact=accepted.some(a=>normalize(userAns)===normalize(a));
  const bestSim=accepted.reduce((best,a)=>Math.max(best,similarity(userAns,a)),0);
  const partial=!exact&&bestSim>=0.8;

  const inp=document.getElementById('answer-input');
  inp.disabled=true;

  // Construire synMap {mot → {registre,note}}
  const synMap={};
  if(w.synonymes) w.synonymes.forEach(s=>{synMap[s.mot]={registre:s.registre,note:s.note};});
  if(!synMap[w.indonesien]) synMap[w.indonesien]={registre:w.classe_grammaticale,note:null};

  const fb=document.getElementById('feedback-main');

  if(exact) {
    correctCount++;
    inp.className='answer-input correct';
    fb.className='feedback-main correct';
    // Si plusieurs réponses valides : montrer les alternatives
    if(accepted.length>1) {
      const others=accepted.filter(a=>normalize(a)!==normalize(userAns));
      const othersHtml=others.map(a=>{
        const info=synMap[a]||{};
        return `<span class="fb-alt"><strong>${a}</strong>${info.registre?` <em>(${info.registre})</em>`:''}${info.note?` — ${info.note}`:''}</span>`;
      }).join(' · ');
      fb.innerHTML=`<span class="fb-icon">✅</span><div class="fb-body"><div class="fb-title">Correct !</div><div class="fb-note">Aussi valide : ${othersHtml}</div></div>`;
    } else {
      fb.innerHTML=`<span class="fb-icon">✅</span><div class="fb-body"><div class="fb-title">Correct !</div></div>`;
    }
  } else if(partial) {
    partialCount++;
    inp.className='answer-input partial';
    fb.className='feedback-main partial';
    // Trouver la réponse la plus proche
    const closest=accepted.reduce((best,a)=>similarity(userAns,a)>similarity(userAns,best)?a:best,accepted[0]);
    const info=synMap[closest]||{};
    const pct=Math.round(bestSim*100);
    fb.innerHTML=`<span class="fb-icon">🟡</span><div class="fb-body">
      <div class="fb-title">Presque ! <span class="fb-half">+0.5 pt (${pct}% similaire)</span></div>
      <div class="fb-note">Réponse exacte : <strong>${closest}</strong>${info.note?` — <em>${info.note}</em>`:''}</div>
    </div>`;
  } else {
    wrongAnswers.push({eng:w.anglais,fra:w.francais,idn:w.indonesien,accepted,userAns,synMap});
    inp.className='answer-input wrong';
    fb.className='feedback-main wrong';
    // Afficher toutes les bonnes réponses avec leur registre/note
    const answersHtml=accepted.map(a=>{
      const info=synMap[a]||{};
      const parts=[];
      if(info.registre) parts.push(`<span class="fb-reg">${info.registre}</span>`);
      if(info.note) parts.push(`<em class="fb-note-inline">${info.note}</em>`);
      return `<div class="fb-answer-item"><strong>${a}</strong>${parts.length?' — '+parts.join(' · '):''}</div>`;
    }).join('');
    const label=accepted.length>1?'Réponses valides :':'La bonne réponse :';
    fb.innerHTML=`<span class="fb-icon">✗</span><div class="fb-body">
      <div class="fb-title">Réponse incorrecte</div>
      <div class="fb-answers-block"><div class="fb-label">${label}</div>${answersHtml}</div>
    </div>`;
  }

  // Bloc synonymes (détails complets) — seulement si synonymes riches
  if(w.synonymes&&w.synonymes.length>0) {
    document.getElementById('syn-list').innerHTML=accepted.map(mot=>{
      const info=synMap[mot]||{};
      const isUser=normalize(mot)===normalize(userAns);
      const isExactUser=exact&&isUser;
      const isPartialUser=partial&&isUser;
      let cls='syn-item';
      if(isExactUser||isPartialUser) cls+=' is-user';
      else if(!exact&&!partial&&mot===w.indonesien) cls+=' is-correct-ans';
      const badge=isExactUser?'<span class="syn-badge-user">← votre réponse</span>':
                  isPartialUser?'<span class="syn-badge-partial">← approx.</span>':'';
      const reg=info.registre?`<span class="syn-registre">${info.registre}</span>`:'';
      const note=info.note?`<div class="syn-note">${info.note}</div>`:'';
      return `<div class="${cls}"><div class="syn-mot">${mot}${badge}</div><div class="syn-meta">${reg}${note}</div></div>`;
    }).join('');
    document.getElementById('synonymes-bloc').classList.add('show');
  }

  document.getElementById('submit-btn').style.display='none';
  const isLast=currentIndex===quizWords.length-1;
  const nb=document.getElementById('next-btn');
  nb.textContent=isLast?'Voir les résultats →':'Suivant →';
  nb.style.display='inline-flex';
  updateScoreLive();
}

function nextQuestion(){
  currentIndex++;
  if(currentIndex>=quizWords.length)showResults();
  else showQuestion();
}

// ══ RÉSULTATS ══
function showResults(){
  document.getElementById('quiz-active').style.display='none';
  document.getElementById('results-panel').style.display='block';
  const total=quizWords.length;
  const finalScore=correctCount+partialCount*0.5;
  const pct=Math.round((finalScore/total)*100);
  const lvl=pct>=80?'great':pct>=50?'ok':'poor';
  const titles={great:'🎉 Excellent travail !',ok:'👍 Pas mal !',poor:'💪 Continue à pratiquer !'};
  const tl=selectedTheme?`· ${THEME_EMOJIS[selectedTheme]||''} ${selectedTheme}`:'';
  const scoreStr=finalScore%1===0?finalScore:finalScore.toFixed(1);
  const subs={
    great:`${scoreStr} / ${total} ${tl} — vous maîtrisez bien ce vocabulaire !`,
    ok:`${scoreStr} / ${total} ${tl} — encore un peu d'entraînement !`,
    poor:`${scoreStr} / ${total} ${tl} — révisez les mots manqués ci-dessous.`
  };
  if(partialCount>0){
    subs[lvl]+= ` (dont ${partialCount} réponse${partialCount>1?'s':''} approximative${partialCount>1?'s':''})`;
  }
  const circle=document.getElementById('score-circle');
  circle.className=`score-circle ${lvl}`;
  circle.innerHTML=`${pct}%<span class="lbl">${scoreStr} / ${total}</span>`;
  document.getElementById('result-title').textContent=titles[lvl];
  document.getElementById('result-sub').textContent=subs[lvl];
  const wl=document.getElementById('wrong-list');
  wl.innerHTML=wrongAnswers.length
    ?`<h3>Mots à revoir (${wrongAnswers.length})</h3>`+wrongAnswers.map(w=>
        `<div class="wrong-item">
          <div><div class="eng">${w.eng}</div><div class="fra">${w.fra}</div></div>
          <div><div class="idn">${w.accepted.join(' · ')}</div><div class="user-ans">Votre réponse : ${w.userAns||'(vide)'}</div></div>
        </div>`).join(''):'';
  saveSession(finalScore,pct,selectedTheme,total);
}

function backToSetup(){
  document.getElementById('results-panel').style.display='none';
  document.getElementById('setup-panel').style.display='block';
}

// ══ STORAGE ══
function saveSession(score,pct,theme,total){
  const h=getHistory();
  h.unshift({date:new Date().toISOString(),score,total,pct,theme:theme||null});
  localStorage.setItem(STORAGE_KEY,JSON.stringify(h.slice(0,100)));
}
function getHistory(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch{return[];}}

// ══ DASHBOARD ══
function renderDashboard(){
  const h=getHistory();
  if(!h.length){
    document.getElementById('dash-empty').style.display='block';
    document.getElementById('dash-content').style.display='none';return;
  }
  document.getElementById('dash-empty').style.display='none';
  document.getElementById('dash-content').style.display='block';
  const avg=Math.round(h.reduce((s,x)=>s+x.pct,0)/h.length);
  const best=Math.max(...h.map(x=>x.pct));
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="val">${h.length}</div><div class="lbl">Sessions</div></div>
    <div class="stat-card"><div class="val">${avg}%</div><div class="lbl">Moyenne</div></div>
    <div class="stat-card"><div class="val">${best}%</div><div class="lbl">Record</div></div>`;
  const recent=[...h].slice(0,10).reverse();
  document.getElementById('bar-chart').innerHTML=recent.map(x=>{
    const col=x.pct>=80?'#22c55e':x.pct>=50?'#f59e0b':'#ef4444';
    const ht=Math.max(4,Math.round((x.pct/100)*BAR_HEIGHT));
    return `<div class="bar-col"><div class="bar" style="height:${ht}px;background:${col}"></div><div class="bar-lbl">${x.pct}%</div></div>`;
  }).join('');
  document.getElementById('history-body').innerHTML=h.map(x=>{
    const lvl=x.pct>=80?'great':x.pct>=50?'ok':'poor';
    const lab={great:'Excellent',ok:'Bien',poor:'À revoir'}[lvl];
    const d=new Date(x.date);
    const ds=d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
    const ts=d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const em=x.theme?(THEME_EMOJIS[x.theme]||'📌'):'🗂️';
    const sc=typeof x.score==='number'&&x.score%1!==0?x.score.toFixed(1):x.score;
    return `<tr>
      <td>${ds} <span style="color:var(--muted);font-size:0.75rem">${ts}</span></td>
      <td style="font-size:0.82rem">${em} ${x.theme||'Tous'}</td>
      <td>${sc}/${x.total}</td><td>${x.pct}%</td>
      <td><span class="pill ${lvl}">${lab}</span></td></tr>`;
  }).join('');
}

function showTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.getElementById('tab-'+(tab==='dashboard'?'dash':'quiz')).classList.add('active');
  if(tab==='dashboard')renderDashboard();
}

initApp();
</script>
